name: Migrations

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

env:
  # Setting these variables allows .NET CLI to use rich color codes in console output
  TERM: xterm
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: true
  # Skip boilerplate output
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  script:
    name: Generate idempotent migrations
    strategy:
      matrix:
        app:
          - Api
          - AdminConsole
        include:
          - app: Api
            ef-context: DbGlobalMsSqlContext
          - app: AdminConsole
            ef-context: MssqlConsoleDbContext

    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0

      - name: Install Entity Framework toolkit
        run: dotnet tool install dotnet-ef --global

      - name: Restore
        run: dotnet restore src/${{ matrix.app }}

      - name: Generate script
        run: >
          dotnet ef migrations script
          --configuration Release
          --project src/${{ matrix.app }}
          --context ${{ matrix.ef-context }}
          --idempotent
          --output ${{ matrix.app }}.sql

      - name: Upload artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ matrix.app }}-${{ matrix.ef-context }}
          path: ${{ matrix.app }}.sql

      - name: Produce summary
        run: |
          {
            echo "### Idempotent migrations for ${{ matrix.app }} (${{ matrix.ef-context }})" 
            echo "\`\`\`sql"
            cat ${{ matrix.app }}.sql
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"